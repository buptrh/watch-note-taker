name: WatchNoteTaker
options:
  bundleIdPrefix: com.watchnotetaker
  deploymentTarget:
    watchOS: "10.0"
    iOS: "17.0"
  xcodeVersion: "16.0"

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit.git
    from: "0.9.0"

targets:
  WatchNoteTaker:
    type: application
    platform: watchOS
    sources:
      - path: Shared
      - path: WatchNoteTaker
        excludes:
          - "Resources/**"
    resources:
      - path: WatchNoteTaker/Resources/whisper-model.bundle
        buildPhase: resources
    dependencies:
      - package: WhisperKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.watchnotetaker.watchkitapp
        DEVELOPMENT_TEAM: 67ZYPV5TLL
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        INFOPLIST_KEY_WKApplication_InterfaceOrientation: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_WKRunsIndependentlyOfCompanionApp: true
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.watchnotetaker
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "WatchNoteTaker records voice notes for transcription."
    entitlements:
      path: WatchNoteTaker/WatchNoteTaker.entitlements

  WatchNoteTakerPhone:
    type: application
    platform: iOS
    sources:
      - path: Shared
      - path: WatchNoteTakerPhone
    dependencies:
      - package: WhisperKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.watchnotetaker
        DEVELOPMENT_TEAM: 67ZYPV5TLL
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "WatchNoteTaker records voice notes for transcription."
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UIBackgroundModes: audio
        TARGETED_DEVICE_FAMILY: 1

  WatchNoteTakerTests:
    type: bundle.unit-test
    platform: watchOS
    sources:
      - WatchNoteTakerTests
    dependencies:
      - target: WatchNoteTaker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.watchnotetaker.tests
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: true

  WatchNoteTakerUITests:
    type: bundle.ui-testing
    platform: watchOS
    sources:
      - WatchNoteTakerUITests
    dependencies:
      - target: WatchNoteTaker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.watchnotetaker.uitests
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: true
